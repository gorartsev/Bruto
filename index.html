<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>BRUTE</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no"/>

<link rel="manifest" href="manifest.webmanifest"/>
<meta name="theme-color" content="#DBDBDB"/>

<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="BRUTE"/>
<link rel="apple-touch-icon" href="icon-180.png"/>
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png"/>
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png"/>

<style>
  html, body {
    margin: 0; padding: 0;
    background: #DBDBDB;
    color: #0A0A0A;
    font-family: 'Inter', -apple-system, system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    -webkit-tap-highlight-color: transparent;
    overscroll-behavior: none;
    position: fixed; width: 100%; height: 100%;
    overflow: hidden;
  }
  * { box-sizing: border-box; }
  input, textarea, button { font-family: inherit; }

  /* Fullscreen mobile stage */
  .stage-mobile {
    position: fixed; inset: 0;
    background: #DBDBDB;
    overflow: hidden;
  }

  /* Desktop preview: phone frame inside a centered stage */
  .stage-desktop {
    position: fixed; inset: 0;
    background: #1c1c1c;
    display: flex; align-items: center; justify-content: center;
    padding: 32px 20px;
    overflow: auto;
  }
  .phone-wrap { position: relative; width: 100%; height: 100%; overflow: hidden; }

  /* Splash (shown before React hydrates) */
  #splash {
    position: fixed; inset: 0; z-index: 9999;
    background: #DBDBDB; color: #0A0A0A;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 18px;
    pointer-events: none;
    transition: opacity 400ms ease-out;
  }
  #splash.hide { opacity: 0; }
  #splash .mark {
    font-family: 'Bebas Neue', 'Impact', sans-serif;
    font-size: 68px; letter-spacing: 0.02em;
    background: #B3121A; color: #F4ECD8;
    padding: 8px 24px 12px; line-height: 1;
    transform: skewX(-2deg);
  }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="ios-frame.jsx?v=7"></script>
<script type="text/babel" src="brute/i18n.jsx?v=7"></script>
<script type="text/babel" src="brute/design-tokens.jsx?v=7"></script>
<script type="text/babel" src="brute/flash.jsx?v=7"></script>
<script type="text/babel" src="brute/exercise-art.jsx?v=7"></script>
<script type="text/babel" src="brute/primitives.jsx?v=7"></script>
<script type="text/babel" src="brute/program.jsx?v=7"></script>
<script type="text/babel" src="brute/state.jsx?v=7"></script>
<script type="text/babel" src="brute/ui.jsx?v=7"></script>
<script type="text/babel" src="brute/screens-core.jsx?v=7"></script>
<script type="text/babel" src="brute/screens-nav.jsx?v=7"></script>
<script type="text/babel" src="brute/screens-wellness.jsx?v=7"></script>
<script type="text/babel" src="brute/app.jsx?v=7"></script>
</head>
<body>
<div id="splash"><div class="mark">BRUTE</div></div>
<div id="root"></div>
<script type="text/babel">

function Root() {
  const [mode, setMode] = React.useState(() => {
    const standalone = window.matchMedia('(display-mode: standalone)').matches
      || window.navigator.standalone === true;
    const narrow = window.innerWidth < 520;
    return (standalone || narrow) ? 'mobile' : 'desktop';
  });
  React.useEffect(() => {
    const onResize = () => {
      const standalone = window.matchMedia('(display-mode: standalone)').matches
        || window.navigator.standalone === true;
      setMode((standalone || window.innerWidth < 520) ? 'mobile' : 'desktop');
    };
    window.addEventListener('resize', onResize);
    return () => window.removeEventListener('resize', onResize);
  }, []);

  React.useEffect(() => {
    // hide splash once we've mounted
    const s = document.getElementById('splash');
    if (s) {
      setTimeout(() => { s.classList.add('hide'); setTimeout(() => s.remove(), 400); }, 250);
    }
  }, []);

  return (
    <BruteProvider>
      <style>{BRUTE_CSS}</style>
      {mode === 'mobile' ? (
        <div className="stage-mobile">
          <div className="phone-wrap">
            <BruteApp mobile={true}/>
          </div>
        </div>
      ) : (
        <div className="stage-desktop">
          <IOSDevice width={402} height={874} dark={false}>
            <div className="phone-wrap" style={{ position: 'relative', width: '100%', height: '100%' }}>
              <BruteApp mobile={false}/>
            </div>
          </IOSDevice>
        </div>
      )}
    </BruteProvider>
  );
}

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch((err) => console.warn('SW register failed', err));
  });
}

ReactDOM.createRoot(document.getElementById('root')).render(<Root/>);

</script>
</body>
</html>
